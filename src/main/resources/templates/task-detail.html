<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Xác nhận kế hoạch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .ai-card { background: #f8f9fa; border-left: 4px solid #9c27b0; }
        .plan-item { background: white; border: 1px solid #eee; padding: 10px; border-radius: 8px; margin-bottom: 8px; }
    </style>
</head>
<body class="bg-light">

<div class="container py-4">
    <a href="/tasks/new" class="text-decoration-none text-muted"><i class="fas fa-arrow-left"></i> Quay lại sửa</a>

    <div class="row mt-3">
        <!-- Cột trái: Dữ liệu từ AI -->
        <div class="col-md-8">
            <h3 class="fw-bold mb-3">Kế hoạch đề xuất <span class="badge bg-light text-dark border">AI Generated</span></h3>

            <!-- Phần To-Do List -->
            <div class="card mb-4 shadow-sm">
                <div class="card-header bg-white fw-bold">Danh sách việc cần làm (To-Do List)</div>
                <div class="card-body">
                    <div th:if="${plan != null and plan.todos != null}">
                        <div th:each="todo : ${plan.todos}" class="plan-item d-flex justify-content-between align-items-center">
                            <span><i class="far fa-square text-muted me-2"></i> <span th:text="${todo.title}">Title</span></span>
                            <span class="badge bg-light text-dark" th:text="${todo.estimatedMinutes} + ' phút'">30 min</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Phần Lịch trình -->
            <div class="card shadow-sm">
                <div class="card-header bg-white fw-bold">Lịch trình chi tiết</div>
                <div class="card-body">
                    <div th:if="${plan != null and plan.schedules != null}">
                        <div th:each="schedule : ${plan.schedules}" class="plan-item">
                            <div class="d-flex justify-content-between">
                                <strong th:text="${schedule.title}">Meeting</strong>
                                <i class="far fa-calendar-plus text-primary"></i>
                            </div>
                            <div class="text-muted small mt-1">
                                <i class="far fa-clock"></i>
                                <span th:text="${#temporals.format(schedule.startTime, 'dd/MM/yyyy - HH:mm')}">Start</span>
                                đến
                                <span th:text="${#temporals.format(schedule.endTime, 'HH:mm')}">End</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Cột phải: Form Xác nhận -->
        <div class="col-md-4">
            <div class="card shadow-sm border-0 sticky-top" style="top: 20px;">
                <div class="card-body ai-card">
                    <h5 class="fw-bold text-purple mb-3"><i class="fas fa-robot"></i> AI Action</h5>
                    <p class="small text-muted mb-4">
                        Hệ thống đã phân tích lịch trống của bạn và đề xuất kế hoạch bên trái.
                        Bấm "Lưu & Đồng bộ" để đẩy lên Google Calendar.
                    </p>

                    <!-- Form Gửi đi -->
                    <form th:action="@{/tasks/confirm}" method="post">
                        <!-- Truyền lại description để lưu vào DB -->
                        <input type="hidden" name="originalDescription" th:value="${originalDescription}">

                        <button type="submit" class="btn btn-success w-100 mb-2">
                            <i class="fas fa-check"></i> Lưu & Đồng bộ Calendar
                        </button>

                        <a href="/tasks/new" class="btn btn-outline-secondary w-100">Không, tạo lại</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
