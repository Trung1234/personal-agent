<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tạo kế hoạch mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0">
                <div class="card-body p-5">
                    <h2 class="fw-bold mb-1">Tạo kế hoạch mới</h2>
                    <p class="text-muted mb-4">AI sẽ giúp bạn chia nhỏ việc và xếp lịch.</p>

                    <form th:action="@{/tasks/generate}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Mô tả công việc</label>
                            <textarea name="description" class="form-control" rows="5" placeholder="Ví dụ: Tôi muốn học ReactJS cơ bản trong 1 tuần, buổi tối rảnh..." required></textarea>
                            <div class="form-text">Hãy mô tả càng chi tiết càng tốt để AI hiểu ý bạn.</div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Từ ngày</label>
                                <input type="date" class="form-control">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Đến ngày</label>
                                <input type="date" class="form-control">
                            </div>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                            <a href="/dashboard" class="btn btn-light">Hủy</a>
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="fas fa-magic"></i> Phân tích & Lập kế hoạch
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
