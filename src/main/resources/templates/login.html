<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - AI Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f0f2f5; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 400px; padding: 40px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .logo { font-size: 28px; font-weight: 800; color: #4285F4; margin-bottom: 10px; }
        .logo span { color: #34A853; }
        .btn-google { background: white; border: 1px solid #ddd; color: #555; width: 100%; padding: 12px; border-radius: 8px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn-google:hover { background: #f8f9fa; border-color: #ccc; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo">AI <span>Agent</span> ✨</div>
    <p class="text-muted mb-4">Quản lý công việc thông minh cùng AI</p>

    <a th:href="@{/oauth2/authorization/google}" class="btn btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" alt="Google">
        Đăng nhập bằng Google
    </a>
</div>
</body>
</html>
